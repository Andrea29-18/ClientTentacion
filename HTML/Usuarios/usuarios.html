<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png"
            href="/Resources/Images/pastel-icon.png">
        <!-- Agregar Axios desde el CDN -->
        <script
            src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/crypto-js@4.0.0/core.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/crypto-js@4.0.0/aes.js"></script>

        <link rel="stylesheet" href="/Styles/style.css">
        <title>Gestion de usuarios</title>
    </head>
    <body>
        <header>
            <h1 class="titulo-elegante">D.Tentación </h1>
            <button class="btn-header">Pedidos pendientes</button>
            <button class="btn-header">Enviar Pedido</button>
        </header>
        <main>
            <section class="sub-header">
                <h1 class="subtitulo">Gestión de usuarios</h1>
                <form action="#" method="GET" class="form-buscar"
                    id="form-buscar">
                    <input type="text" name="query" id="input-buscar"
                        placeholder="Buscar usuarios..." required
                        class="input-buscar">
                    <button type="submit" class="btn-buscar">Buscar</button>
                </form>

            </section>

            <button class="btn-header"
                onclick="location.href='/HTML/Usuarios/agregarUsuario.html'">Añadir
                usuario</button>

            <section class="tabla">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre </th>
                            <th>telefono</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aquí se llenarán los productos -->
                    </tbody>
                </table>
            </section>
        </main>
        <footer>
            <div>
                <p>&copy; 2024 D.Tentacion. Todos los derechos reservados.</p>
                <p>Desarrollado por <strong>LULA Code</strong>.</p>
            </div>
        </footer>
        <script type="module" src="/Services/Usuarios/usuarios.js"></script>
    </body>

</html>
